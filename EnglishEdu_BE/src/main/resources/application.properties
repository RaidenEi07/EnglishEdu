# Server
server.port=4000

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/EnglishEdu}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:GilArchon}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# DEV: update (auto-creates tables) | PROD: validate (Flyway manages schema, Hibernate only validates)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Allow flyway:clean — default TRUE (safe). Set FLYWAY_CLEAN_DISABLED=false only in local dev
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:true}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true

# Application
app.base-url=${APP_BASE_URL:http://localhost:5173}
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET:CHANGE_ME_a_very_long_secret_key_at_least_256_bits_long_for_hs256}
jwt.expiration=86400000

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:sso-uploads}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Moodle Integration
moodle.url=${MOODLE_URL:http://localhost:8088}
# REQUIRED: set MOODLE_TOKEN in .env / environment — never leave as the dev default in production
moodle.token=${MOODLE_TOKEN:}
# REQUIRED: set MOODLE_SSO_SECRET to a long random string in .env
moodle.sso-secret=${MOODLE_SSO_SECRET:change-me-strong-random-secret}
moodle.service-name=${MOODLE_SERVICE_NAME:moodle_mobile_app}

# Admin seed — override via env vars for production
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@sunshine.local}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
# Set SEED_DEMO_TEACHER=true only in development environments
app.seed.demo-teacher=${SEED_DEMO_TEACHER:false}
