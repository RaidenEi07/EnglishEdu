events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile   on;
    tcp_nopush on;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml image/svg+xml;

    # ── Shared proxy headers ───────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Redirect HTTP → HTTPS for all ─────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ================================================================
    #  MAIN SITE: sunshineschool.edu.vn
    # ================================================================
    server {
        listen 443 ssl;
        server_name sunshineschool.edu.vn www.sunshineschool.edu.vn;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Frontend static files ──────────────────────────
        root  /usr/share/nginx/html;
        index index.html;

        location / {
            # SPA-friendly: tries file → directory → index.html per page
            try_files $uri $uri/ $uri.html /index.html;
        }

        # Static assets: long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Backend API ────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:4000;
            proxy_read_timeout 120s;
        }

        # ── WebSocket (STOMP) ──────────────────────────────
        location /ws {
            proxy_pass          http://backend:4000;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_read_timeout  3600s;
        }
    }

    # ================================================================
    #  MOODLE LMS: lms.sunshineschool.edu.vn
    # ================================================================
    server {
        listen 443 ssl;
        server_name lms.sunshineschool.edu.vn;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Moodle needs larger body for file uploads
        client_max_body_size 200M;

        location / {
            proxy_pass         http://moodle:8080;
            proxy_read_timeout 300s;
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
        }
    }
}
