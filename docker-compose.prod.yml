# ============================================================
#  EnglishEdu – Production Docker Compose
#  Usage:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# ============================================================

services:

  # ─── Nginx reverse proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./sunshine-rebuild/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL: uncomment when domain + cert are ready
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - moodle
    restart: unless-stopped
    networks:
      - app_net

  # ─── Spring Boot backend ──────────────────────────────────
  backend:
    build:
      context: ./EnglishEdu_BE
      dockerfile: Dockerfile
    expose:
      - "4000"
    environment:
      # Database
      DB_URL: jdbc:postgresql://postgres:5432/sso_db
      DB_USERNAME: sso_user
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: sso-uploads
      # Moodle (internal Docker URL)
      MOODLE_URL: http://moodle:8080
      MOODLE_TOKEN: ${MOODLE_TOKEN}
      MOODLE_SSO_SECRET: ${MOODLE_SSO_SECRET}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      # App
      APP_BASE_URL: https://${DOMAIN}
      CORS_ORIGINS: https://${DOMAIN}
      # Mail
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # Production: Flyway manages schema — Hibernate only validates; disable flyway:clean
      JPA_DDL_AUTO: validate
      FLYWAY_CLEAN_DISABLED: "true"
      # Admin account seed (override defaults)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@sunshine.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Never seed demo teacher in production
      SEED_DEMO_TEACHER: "false"
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    networks:
      - app_net

  # ─── PostgreSQL (for Spring Boot) ─────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sso_db
      POSTGRES_USER: sso_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app_net

  # ─── Redis (JWT blacklist + cache) ────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_net

  # ─── MinIO (file storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    expose:
      - "9000"
    ports:
      - "9001:9001"   # Console – restrict via firewall in production
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped
    networks:
      - app_net

  # ─── Moodle LMS ───────────────────────────────────────────
  moodle:
    image: bitnamilegacy/moodle:latest
    expose:
      - "8080"
    environment:
      - MOODLE_DATABASE_HOST=mariadb
      - ALLOW_EMPTY_PASSWORD=yes
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_PASSWORD=bn_pass
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_HOST=${LMS_DOMAIN}
      - MOODLE_USERNAME=${MOODLE_ADMIN_USER:-admin}
      - MOODLE_PASSWORD=${MOODLE_ADMIN_PASSWORD}
      - MOODLE_EMAIL=${MOODLE_ADMIN_EMAIL}
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
    depends_on:
      - mariadb
    restart: unless-stopped
    networks:
      - app_net

  # ─── MariaDB (for Moodle) ─────────────────────────────────
  mariadb:
    image: bitnamilegacy/mariadb:latest
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=bn_pass
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/bitnami/mariadb
      # Moodle DB seed: auto-imported on first startup if volume is empty
      # Files run alphabetically — z-cleanup runs after the main dump
      - ./moddle-lms/moodle-db-export.sql:/docker-entrypoint-initdb.d/moodle-db-export.sql:ro
      - ./moddle-lms/z-cleanup-users.sql:/docker-entrypoint-initdb.d/z-cleanup-users.sql:ro
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  pgdata:
  miniodata:
  moodle_data:
  moodledata_data:
  mariadb_data:
