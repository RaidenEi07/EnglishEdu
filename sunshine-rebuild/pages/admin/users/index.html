<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người dùng | Quản trị Sunshine School Online</title>
    <link rel="shortcut icon" href="/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>body{opacity:0}body.ready{opacity:1;transition:opacity .12s}</style>
</head>
<body>

    <!-- Navbar (injected by injectNavbar) -->
    <nav id="main-navbar"></nav>

    <!-- Admin Sub-Nav -->
    <nav class="admin-subnav">
        <div class="container-fluid">
            <ul class="nav mb-0">
                <li class="nav-item"><a class="nav-link" href="/pages/admin/"><i class="fa fa-gauge me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/pages/admin/users/"><i class="fa fa-users me-1"></i>Người dùng</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/admin/courses/"><i class="fa fa-book me-1"></i>Khóa học</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/admin/enrollments/"><i class="fa fa-list-check me-1"></i>Đăng ký</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="container-fluid">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h4 class="mb-0"><i class="fa fa-users me-2 text-primary"></i>Quản lý người dùng</h4>
                <button class="btn btn-primary btn-sm" id="createUserBtn">
                    <i class="fa fa-user-plus me-1"></i>Thêm người dùng
                </button>
            </div>

            <!-- Filters -->
            <div class="card shadow-sm mb-3">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-center">
                        <div class="col-sm-5 col-md-4">
                            <input type="search" id="searchInput" class="form-control form-control-sm" placeholder="Tìm theo username, email...">
                        </div>
                        <div class="col-auto">
                            <select id="roleFilter" class="form-select form-select-sm">
                                <option value="">Tất cả vai trò</option>
                                <option value="STUDENT">Student</option>
                                <option value="TEACHER">Teacher</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button id="applyFilter" class="btn btn-sm btn-primary">Lọc</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width:60px">#</th>
                                    <th>Username</th>
                                    <th class="d-none d-md-table-cell">Họ tên</th>
                                    <th class="d-none d-lg-table-cell">Email</th>
                                    <th>Vai trò</th>
                                    <th>Trạng thái</th>
                                    <th class="d-none d-lg-table-cell">Ngày tạo</th>
                                    <th style="width:130px">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <tr><td colspan="8" class="text-center py-4"><span class="spinner-border spinner-border-sm"></span> Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="small text-muted" id="pageInfo"></div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" id="prevPage" disabled>← Trước</button>
                    <button class="btn btn-sm btn-outline-secondary" id="nextPage" disabled>Sau →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Role change modal -->
    <div class="modal fade" id="roleModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Đổi vai trò</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <p class="small text-muted mb-2">Người dùng: <strong id="roleModalUsername"></strong></p>
                    <select id="roleSelect" class="form-select">
                        <option value="STUDENT">STUDENT</option>
                        <option value="TEACHER">TEACHER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary btn-sm" id="saveRoleBtn">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create User modal -->
    <div class="modal fade" id="createUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-user-plus me-2 text-primary"></i>Tạo tài khoản mới</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="cuAlert" class="alert d-none"></div>
                    <div class="row g-2 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label">Username <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="cuUsername" placeholder="vd: john_doe" autocomplete="off">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label">Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="cuPassword" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="cuEmail" placeholder="vd: john@example.com">
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label">Họ</label>
                            <input type="text" class="form-control" id="cuLastName" placeholder="Nguyễn">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label">Tên</label>
                            <input type="text" class="form-control" id="cuFirstName" placeholder="Văn A">
                        </div>
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Vai trò</label>
                        <select class="form-select" id="cuRole">
                            <option value="STUDENT">STUDENT</option>
                            <option value="TEACHER">TEACHER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary btn-sm" id="saveNewUserBtn"><i class="fa fa-save me-1"></i>Tạo tài khoản</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Assign Courses modal -->
    <div class="modal fade" id="assignModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-book-open me-2 text-primary"></i>Chỉ định khóa học</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-3">Học sinh: <strong id="assignModalUsername"></strong>. Chọn các khóa học muốn chỉ định.</p>
                    <div id="assignCourseList" style="max-height:400px;overflow-y:auto"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary btn-sm" id="saveAssignBtn"><i class="fa fa-save me-1"></i>Lưu chỉ định</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="page-footer"></footer>
    <script type="module" src="./users.ts"></script>
</body>
</html>
