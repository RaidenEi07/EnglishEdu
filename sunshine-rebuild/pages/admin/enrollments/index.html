<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Quản trị Sunshine School Online</title>
    <link rel="shortcut icon" href="/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>body{opacity:0}body.ready{opacity:1;transition:opacity .12s}</style>
</head>
<body>

    <!-- Navbar (injected by injectNavbar) -->
    <nav id="main-navbar"></nav>

    <!-- Admin Sub-Nav -->
    <nav class="admin-subnav">
        <div class="container-fluid">
            <ul class="nav mb-0">
                <li class="nav-item"><a class="nav-link" href="/pages/admin/"><i class="fa fa-gauge me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/admin/users/"><i class="fa fa-users me-1"></i>Người dùng</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/admin/courses/"><i class="fa fa-book me-1"></i>Khóa học</a></li>
                <li class="nav-item"><a class="nav-link active" href="/pages/admin/enrollments/"><i class="fa fa-list-check me-1"></i>Đăng ký</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="container-fluid">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h4 class="mb-0"><i class="fa fa-list-check me-2 text-warning"></i>Quản lý đăng ký</h4>
            </div>

            <!-- Status Tabs -->
            <ul class="nav nav-tabs mb-3" id="statusTabs">
                <li class="nav-item"><a class="nav-link active" href="#" data-status="pending">Chờ duyệt</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-status="active">Đang học</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-status="">Tất cả</a></li>
            </ul>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width:60px">#</th>
                                    <th>Học viên</th>
                                    <th>Khóa học</th>
                                    <th>Trạng thái</th>
                                    <th class="d-none d-md-table-cell">Tiến độ</th>
                                    <th class="d-none d-lg-table-cell">Ngày đăng ký</th>
                                    <th style="width:140px">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="enrollTableBody">
                                <tr><td colspan="7" class="text-center py-4"><span class="spinner-border spinner-border-sm"></span> Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="small text-muted" id="pageInfo"></div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" id="prevPage" disabled>← Trước</button>
                    <button class="btn btn-sm btn-outline-secondary" id="nextPage" disabled>Sau →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Revoke Modal -->
    <div class="modal fade" id="revokeModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Thu hồi đăng ký</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <p class="small text-muted">Học viên: <strong id="revokeStudent"></strong></p>
                    <p class="small text-muted mb-2">Khóa học: <strong id="revokeCourse"></strong></p>
                    <label class="form-label small">Lý do (tùy chọn)</label>
                    <textarea class="form-control form-control-sm" id="revokeNote" rows="2" placeholder="Lý do thu hồi..."></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-danger btn-sm" id="confirmRevokeBtn">Thu hồi</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="page-footer"></footer>
    <script type="module" src="./enrollments.ts"></script>
</body>
</html>
