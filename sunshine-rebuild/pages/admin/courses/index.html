<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học | Quản trị Sunshine School Online</title>
    <link rel="shortcut icon" href="/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>body{opacity:0}body.ready{opacity:1;transition:opacity .12s}</style>
</head>
<body>

    <!-- Navbar (injected by injectNavbar) -->
    <nav id="main-navbar"></nav>

    <!-- Admin Sub-Nav -->
    <nav class="admin-subnav">
        <div class="container-fluid">
            <ul class="nav mb-0">
                <li class="nav-item"><a class="nav-link" href="/pages/admin/"><i class="fa fa-gauge me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/admin/users/"><i class="fa fa-users me-1"></i>Người dùng</a></li>
                <li class="nav-item"><a class="nav-link active" href="/pages/admin/courses/"><i class="fa fa-book me-1"></i>Khóa học</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/admin/enrollments/"><i class="fa fa-list-check me-1"></i>Đăng ký</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="container-fluid">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h4 class="mb-0"><i class="fa fa-book me-2 text-success"></i>Quản lý khóa học</h4>
                <button class="btn btn-success btn-sm" id="addCourseBtn">
                    <i class="fa fa-plus me-1"></i>Thêm khóa học
                </button>
            </div>

            <!-- Filters -->
            <div class="card shadow-sm mb-3">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-center">
                        <div class="col-sm-5 col-md-4">
                            <input type="search" id="courseSearch" class="form-control form-control-sm" placeholder="Tìm theo tên, danh mục...">
                        </div>
                        <div class="col-auto">
                            <select id="publishedFilter" class="form-select form-select-sm">
                                <option value="">Tất cả trạng thái</option>
                                <option value="true">Công khai</option>
                                <option value="false">Ẩn</option>
                            </select>
                        </div>
                        <div class="col-sm-3 col-md-2">
                            <input type="text" id="categoryFilter" class="form-control form-control-sm" placeholder="Danh mục">
                        </div>
                        <div class="col-auto">
                            <button id="applyFilter" class="btn btn-sm btn-primary">Lọc</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width:60px">#</th>
                                    <th>Tên khóa học</th>
                                    <th class="d-none d-md-table-cell">Danh mục</th>
                                    <th class="d-none d-md-table-cell">Cấp độ</th>
                                    <th class="d-none d-lg-table-cell">Giáo viên</th>
                                    <th>Trạng thái</th>
                                    <th style="width:110px">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="courseTableBody">
                                <tr><td colspan="7" class="text-center py-4"><span class="spinner-border spinner-border-sm"></span> Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="small text-muted" id="pageInfo"></div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" id="prevPage" disabled>← Trước</button>
                    <button class="btn btn-sm btn-outline-secondary" id="nextPage" disabled>Sau →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Create / Edit Course Modal -->
    <div class="modal fade" id="courseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="courseModalTitle">Thêm khóa học</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="courseModalAlert" class="alert d-none"></div>
                    <input type="hidden" id="courseId">
                    <div class="mb-3">
                        <label class="form-label">Tên khóa học <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="courseName">
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col">
                            <label class="form-label">Danh mục</label>
                            <input type="text" class="form-control" id="courseCategory" placeholder="VD: Grammar">
                        </div>
                        <div class="col">
                            <label class="form-label">Cấp độ</label>
                            <select class="form-select" id="courseLevel">
                                <option value="">— Chọn —</option>
                                <option>Beginner</option>
                                <option>Elementary</option>
                                <option>Intermediate</option>
                                <option>Upper-Intermediate</option>
                                <option>Advanced</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" id="courseDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL ảnh bìa</label>
                        <input type="url" class="form-control" id="courseImageUrl">
                    </div>
                    <div class="mb-3 position-relative">
                        <label class="form-label">Giáo viên phụ trách</label>
                        <input type="text" class="form-control" id="courseTeacherSearch" autocomplete="off"
                               placeholder="Nhập tên hoặc username để tìm giáo viên...">
                        <input type="hidden" id="courseTeacherId">
                        <div id="teacherDropdown" class="list-group mt-1 position-absolute w-100 shadow-sm d-none"
                             style="z-index:1060;max-height:200px;overflow-y:auto;"></div>
                        <div id="teacherSelected" class="mt-1 small text-muted d-none">
                            <i class="fa fa-check-circle text-success me-1"></i>
                            <span id="teacherSelectedName"></span>
                            <button type="button" class="btn btn-link btn-sm p-0 ms-2 text-danger" id="clearTeacherBtn">
                                <i class="fa fa-times"></i> Xóa
                            </button>
                        </div>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="coursePublished" checked>
                        <label class="form-check-label" for="coursePublished">Công khai (Publish)</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary btn-sm" id="saveCourseBtn">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="page-footer"></footer>
    <script type="module" src="./courses.ts"></script>
</body>
</html>
