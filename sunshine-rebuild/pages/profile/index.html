<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | Sunshine School Online</title>
    <link rel="shortcut icon" href="/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>body{opacity:0}body.ready{opacity:1;transition:opacity .12s}</style>
</head>
<body class="bg-light">

    <!-- Navbar (injected by injectNavbar) -->
    <nav id="main-navbar"></nav>

    <!-- Page Header -->
    <div class="mt-navbar bg-white border-bottom py-3 shadow-sm">
        <div class="container-fluid">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1">
                    <li class="breadcrumb-item"><a href="/index.html" data-i18n="nav.home">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="/pages/my/dashboard/" data-i18n="nav.dashboard">Tổng quan</a></li>
                    <li class="breadcrumb-item active" aria-current="page" data-i18n="nav.profile">Hồ sơ cá nhân</li>
                </ol>
            </nav>
            <h4 class="mb-0 fw-bold" data-i18n="nav.profile">Hồ sơ cá nhân</h4>
        </div>
    </div>

    <!-- Main Content -->
    <main class="py-4">
        <div class="container" style="max-width: 840px;">

            <div id="profileAlert" class="alert d-none mb-3" role="alert"></div>

            <div class="row g-4">

                <!-- Left: Avatar card -->
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm text-center p-4">
                        <div class="position-relative d-inline-block mx-auto mb-3">
                            <img src="/images/course-placeholder.svg" id="profileAvatar"
                                 class="rounded-circle border" width="100" height="100"
                                 alt="Avatar" style="object-fit:cover;">
                            <label for="avatarUpload" class="position-absolute bottom-0 end-0
                                   bg-primary text-white rounded-circle p-1 cursor-pointer"
                                   style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;"
                                   title="Đổi ảnh">
                                <i class="fas fa-camera" style="font-size:12px;"></i>
                            </label>
                            <input type="file" id="avatarUpload" accept="image/*" class="d-none" aria-label="Upload avatar">
                        </div>
                        <h5 class="mb-0" id="profileDisplayName">Học viên</h5>
                        <p class="text-muted small mb-0" id="profileUsername">@username</p>
                        <hr>
                        <div class="text-start">
                            <p class="small mb-1"><i class="fas fa-envelope me-2 text-muted"></i><span id="profileEmail">—</span></p>
                            <p class="small mb-0"><i class="fas fa-calendar me-2 text-muted"></i>
                                <span data-i18n="profile.member_since">Thành viên từ</span>
                                <span id="profileJoined">—</span>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Right: Edit forms -->
                <div class="col-md-8">

                    <!-- Profile info form -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white border-0 pt-3 pb-0">
                            <h5 class="mb-1" data-i18n="profile.edit_info">Thông tin cá nhân</h5>
                        </div>
                        <div class="card-body">
                            <form id="profileForm" novalidate>
                                <div class="mb-3">
                                    <label for="inputFirstName" class="form-label fw-medium" data-i18n="profile.first_name">Họ</label>
                                    <input type="text" class="form-control" id="inputFirstName" autocomplete="given-name">
                                </div>
                                <div class="mb-3">
                                    <label for="inputLastName" class="form-label fw-medium" data-i18n="profile.last_name">Tên</label>
                                    <input type="text" class="form-control" id="inputLastName" autocomplete="family-name">
                                </div>
                                <div class="mb-3">
                                    <label for="inputEmail" class="form-label fw-medium" data-i18n="profile.email">Email</label>
                                    <input type="email" class="form-control" id="inputEmail" autocomplete="email">
                                </div>
                                <div class="mb-3">
                                    <label for="inputUsername" class="form-label fw-medium" data-i18n="profile.username">Tên đăng nhập</label>
                                    <input type="text" class="form-control" id="inputUsername" readonly aria-readonly="true" autocomplete="username">
                                    <div class="form-text" data-i18n="profile.username_note">Tên đăng nhập không thể thay đổi.</div>
                                </div>
                                <button type="submit" class="btn btn-primary" data-i18n="profile.save">Lưu thay đổi</button>
                            </form>
                        </div>
                    </div>

                    <!-- Change password form -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 pt-3 pb-0">
                            <h5 class="mb-1" data-i18n="profile.change_password">Đổi mật khẩu</h5>
                        </div>
                        <div class="card-body">
                            <form id="changePasswordForm" novalidate>
                                <div class="mb-3">
                                    <label for="currentPassword" class="form-label fw-medium" data-i18n="profile.current_password">Mật khẩu hiện tại</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="currentPassword" autocomplete="current-password">
                                        <button class="btn btn-outline-secondary" type="button" data-pw-toggle="currentPassword" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label fw-medium" data-i18n="profile.new_password">Mật khẩu mới</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="newPassword" autocomplete="new-password">
                                        <button class="btn btn-outline-secondary" type="button" data-pw-toggle="newPassword" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
                                    </div>
                                    <div class="form-text" data-i18n="profile.pw_hint">Tối thiểu 8 ký tự, gồm chữ hoa, chữ thường và số.</div>
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label fw-medium" data-i18n="profile.confirm_password">Xác nhận mật khẩu mới</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="confirmPassword" autocomplete="new-password">
                                        <button class="btn btn-outline-secondary" type="button" data-pw-toggle="confirmPassword" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
                                    </div>
                                </div>
                                <div id="pwError" class="text-danger small mb-2 d-none"></div>
                                <button type="submit" class="btn btn-warning text-dark fw-medium" data-i18n="profile.change_password">Đổi mật khẩu</button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Footer (injected by footer.ts) -->
    <footer id="page-footer"></footer>

    <script type="module" src="/pages/profile/profile.ts"></script>
</body>
</html>
