<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý | Sunshine School Online</title>
    <link rel="shortcut icon" href="/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>body{opacity:0}body.ready{opacity:1;transition:opacity .12s}</style>
</head>
<body>

    <!-- Navbar (injected by injectNavbar) -->
    <nav id="main-navbar"></nav>

    <!-- Main Content -->
    <main class="admin-main admin-main--no-subnav">
        <div class="container-fluid">

            <!-- Page title -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h4 class="mb-0"><i class="fa fa-shield-halved me-2 text-danger"></i>Quản lý đăng ký khóa học</h4>
                <button id="refreshBtn" class="btn btn-outline-secondary btn-sm">
                    <i class="fa fa-refresh me-1"></i>Làm mới
                </button>
            </div>

            <!-- Stats row -->
            <div class="row g-3 mb-4" id="statsRow">
                <div class="col-sm-4 col-lg-2">
                    <div class="card border-0 shadow-sm h-100 border-start border-4 border-warning">
                        <div class="card-body py-3">
                            <p class="text-muted small mb-1">Chờ duyệt</p>
                            <div class="fs-4 fw-bold" id="statPending"><span class="spinner-border spinner-border-sm"></span></div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4 col-lg-2">
                    <div class="card border-0 shadow-sm h-100 border-start border-4 border-success">
                        <div class="card-body py-3">
                            <p class="text-muted small mb-1">Đang học</p>
                            <div class="fs-4 fw-bold" id="statActive"><span class="spinner-border spinner-border-sm"></span></div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4 col-lg-2">
                    <div class="card border-0 shadow-sm h-100 border-start border-4 border-info">
                        <div class="card-body py-3">
                            <p class="text-muted small mb-1">Tổng</p>
                            <div class="fs-4 fw-bold" id="statTotal"><span class="spinner-border spinner-border-sm"></span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Enrollment table card -->
            <div class="card shadow-sm border-0">
                <!-- In-page status tabs -->
                <div class="card-header bg-white border-bottom-0 pt-3 pb-0">
                    <ul class="nav nav-tabs card-header-tabs" id="enrollTabs">
                        <li class="nav-item">
                            <a class="nav-link active" id="tabPending" href="#" data-status="pending">
                                <i class="fa fa-clock me-1"></i>Chờ duyệt
                                <span class="badge bg-warning text-dark ms-1" id="pendingBadge" style="font-size:.7rem;"></span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="tabActive" href="#" data-status="active">
                                <i class="fa fa-check-circle me-1"></i>Đang học
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="tabAll" href="#" data-status="">
                                <i class="fa fa-list me-1"></i>Tất cả
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="card-header bg-white d-flex align-items-center justify-content-between py-2 border-top">
                    <h6 class="mb-0 fw-semibold" id="tableTitle">Danh sách chờ duyệt</h6>
                    <span class="text-muted small" id="pageInfo">—</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width:50px">#</th>
                                <th>Học sinh</th>
                                <th>Khóa học</th>
                                <th>Ngày đăng ký</th>
                                <th>Trạng thái</th>
                                <th style="width:130px">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="enrollTableBody">
                            <tr><td colspan="6" class="text-center py-4"><span class="spinner-border spinner-border-sm"></span></td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center py-2">
                    <button id="prevPage" class="btn btn-sm btn-outline-secondary" disabled>
                        <i class="fa fa-chevron-left me-1"></i>Trước
                    </button>
                    <span class="small text-muted" id="pageLabel">—</span>
                    <button id="nextPage" class="btn btn-sm btn-outline-secondary" disabled>
                        Tiếp<i class="fa fa-chevron-right ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Revoke Modal -->
    <div class="modal fade" id="revokeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title text-danger"><i class="fa fa-ban me-2"></i>Thu hồi đăng ký</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-2">Thu hồi đăng ký của <strong id="revokeStudent"></strong> cho khóa học <strong id="revokeCourse"></strong>?</p>
                    <label class="form-label small">Ghi chú (tùy chọn)</label>
                    <textarea id="revokeNote" class="form-control form-control-sm" rows="3" placeholder="Lý do thu hồi..."></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
                    <button id="confirmRevokeBtn" class="btn btn-danger btn-sm">Thu hồi</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="page-footer"></footer>

    <script type="module" src="/pages/manage/manage.ts"></script>
</body>
</html>
